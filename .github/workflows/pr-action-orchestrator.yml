name: Pull Request Action Orchestrator

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [master, 'candidate-*']
    paths:
      - '**/pom.xml'
      - '**/src/**/*.java'
      - '**/src/**/*.properties'
      - '**/src/**/*.xml'
      - '**/src/**/*.ecl'
      - '.github/workflows/pr-action-orchestrator.yml'
      - '.github/workflows/k8s-regression-suite.yml'
      - '.github/workflows/baremetal-regression-suite.yml'
      - '.github/workflows/javadoc-test.yml'
      - '.github/actions/**'

permissions:
  contents: read
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      build-success: ${{ steps.build.outcome == 'success' }}
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.event.pull_request.head.sha }}
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: 'temurin'

    # speed things up with caching from https://docs.github.com/en/actions/guides/building-and-testing-java-with-maven
    - name: Cache Maven packages
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Build with Maven
      id: build
      run: mvn -B -Dmaven.test.skip=true package --file pom.xml

  trigger-javadoc-test:
    uses: ./.github/workflows/javadoc-test.yml
    needs: build
    if: needs.build.outputs.build-success == 'true'
    with:
      head_sha: ${{ github.event.pull_request.head.sha }}

  trigger-k8s-regression:
    uses: ./.github/workflows/k8s-regression-suite.yml
    needs: build
    if: needs.build.outputs.build-success == 'true'
    with:
      head_sha: ${{ github.event.pull_request.head.sha }}

  trigger-baremetal-regression:
    uses: ./.github/workflows/baremetal-regression-suite.yml
    needs: build
    if: needs.build.outputs.build-success == 'true'
    with:
      pull_request_number: ${{ github.event.pull_request.number }}
      pull_request_title: ${{ github.event.pull_request.title }}
      pull_request_author: ${{ github.event.pull_request.user.login }}
      pull_url: ${{ github.event.pull_request.html_url }}
      comments_url: ${{ github.event.pull_request.comments_url }}
      base_ref: ${{ github.base_ref }}
      head_sha: ${{ github.event.pull_request.head.sha }}